<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>工程测量 · 刷题</title>
<style>
:root {
  --clr-bg: #f3f1ec;
  --clr-surface: #ffffff;
  --clr-primary: #1a365d;
  --clr-primary-light: #eef2f8;
  --clr-accent: #dd6b20;
  --clr-accent-light: #fef3e7;
  --clr-success: #276749;
  --clr-success-light: #eafaf1;
  --clr-error: #c53030;
  --clr-error-light: #fef0ef;
  --clr-text: #1a202c;
  --clr-muted: #718096;
  --clr-border: #e2e8f0;
  --clr-bar: #d69e2e;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,.08);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--clr-bg);color:var(--clr-text);min-height:100vh;line-height:1.6;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
.app{max-width:740px;margin:0 auto;padding:16px 12px 32px}

/* header */
.header{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 12px;flex-wrap:wrap;gap:4px}
.header h1{font-size:22px;font-weight:700;color:var(--clr-primary);letter-spacing:-.3px}
.header .sub{font-size:13px;font-weight:400;color:var(--clr-muted);margin-left:2px}
.header .count{font-size:13px;color:var(--clr-muted);background:var(--clr-primary-light);padding:2px 12px;border-radius:20px}

/* home */
#homeView{padding-top:8px}
.home-heading{font-size:17px;font-weight:600;color:var(--clr-primary);padding:12px 4px 8px;display:flex;align-items:center;justify-content:center;gap:8px}
.home-heading .diamond{color:var(--clr-accent);font-size:14px}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin:6px 0 20px}
.card{
  background:var(--clr-surface);border-radius:var(--radius-lg);padding:22px 16px;
  cursor:pointer;border:1.5px solid var(--clr-border);box-shadow:var(--shadow-sm);
  transition:all .2s;position:relative;overflow:hidden;text-align:center;
}
.card:active{transform:scale(.97)}
.card:hover{border-color:var(--clr-accent);box-shadow:0 2px 8px rgba(221,107,32,.12)}
.card .num{font-size:30px;font-weight:700;color:var(--clr-primary);line-height:1;letter-spacing:-.5px}
.card .name{font-size:14px;color:var(--clr-text);margin-top:6px;line-height:1.4}
.card .badge{font-size:12px;color:var(--clr-muted);background:var(--clr-primary-light);padding:2px 12px;border-radius:10px;display:inline-block;margin-top:10px}
.card .bar{position:absolute;bottom:0;left:0;height:3px;background:var(--clr-accent);transition:width .4s}

.home-actions{display:flex;gap:10px;flex-wrap:wrap;margin:4px 0 16px}
.btn-action{
  flex:1;min-width:130px;padding:14px 18px;border:none;border-radius:var(--radius-md);
  font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.btn-action:active{transform:scale(.97)}
.btn-random{background:var(--clr-accent);color:#fff}
.btn-random:hover{background:#c95f1c}
.btn-all{background:var(--clr-primary);color:#fff}
.btn-all:hover{background:#142c4d}
.btn-review{background:var(--clr-success);color:#fff}
.btn-review:hover{background:#1f5c38}

.home-footer{font-size:13px;color:var(--clr-muted);text-align:center;border-top:1px solid var(--clr-border);padding-top:14px;margin-top:4px}
.home-footer span{background:var(--clr-primary-light);padding:0 10px;border-radius:10px;display:inline-block}

/* quiz view */
#quizView{display:none}
#quizView.active{display:block;animation:slideUp .25s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.nav-bar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 10px}
.nav-btn{padding:7px 16px;border:none;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;background:var(--clr-primary-light);color:var(--clr-primary);flex:0 1 auto}
.nav-btn:active{transform:scale(.96)}
.nav-btn.primary{background:var(--clr-accent);color:#fff}
.nav-btn.outline{border:1.5px solid var(--clr-border);background:transparent;color:var(--clr-muted)}

.stats-bar{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--clr-muted);padding:6px 0;gap:6px;flex-wrap:wrap}
.stats-bar .tag{background:var(--clr-primary-light);padding:2px 12px;border-radius:12px;font-size:12px}
.stats-bar .tag.done{background:var(--clr-success-light);color:var(--clr-success)}

.progress-strip{position:relative;height:6px;background:var(--clr-border);border-radius:3px;margin:4px 0 12px;overflow:hidden}
.progress-strip .fill{height:100%;background:var(--clr-accent);border-radius:3px;transition:width .4s;min-width:0}
.progress-strip .dot{position:absolute;top:50%;width:8px;height:8px;border-radius:50%;background:#fff;border:2px solid var(--clr-border);transform:translate(-50%,-50%);transition:left .4s;z-index:1}
.progress-strip .dot.active{border-color:var(--clr-accent);background:var(--clr-accent)}

/* question */
.question-area{background:var(--clr-surface);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--clr-border);margin-top:4px}
.q-header{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.q-number{font-weight:700;color:var(--clr-primary);font-size:14px}
.q-type{font-size:11px;font-weight:600;padding:2px 12px;border-radius:10px;letter-spacing:.3px}
.q-type.single{background:#e8f0fe;color:#1a56db}
.q-type.multi{background:#fef3e7;color:var(--clr-accent)}

.q-label{font-size:14px;font-weight:500;color:var(--clr-muted);margin-bottom:6px}

.q-text{font-size:16px;line-height:1.7;margin-bottom:18px;padding:2px 0;color:var(--clr-text)}

/* options */
.options{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:11px 14px;border:2px solid var(--clr-border);border-radius:var(--radius-sm);
  font-size:15px;line-height:1.5;cursor:pointer;transition:all .12s;
  background:var(--clr-surface);user-select:none;word-break:break-word;
  -webkit-tap-highlight-color:transparent;
}
.opt:active{transform:scale(.98)}
.opt .marker{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:2px solid var(--clr-border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--clr-muted);transition:all .12s;margin-top:1px}
.opt.selected{border-color:var(--clr-primary)}
.opt.selected .marker{border-color:var(--clr-primary);background:var(--clr-primary);color:#fff}
.opt.correct{border-color:var(--clr-success);background:var(--clr-success-light)}
.opt.correct .marker{border-color:var(--clr-success);background:var(--clr-success);color:#fff}
.opt.wrong{border-color:var(--clr-error);background:var(--clr-error-light)}
.opt.wrong .marker{border-color:var(--clr-error);background:var(--clr-error);color:#fff}
.opt.disabled{cursor:default;pointer-events:none}
.opt .text{flex:1;padding-top:1px}

/* explanation */
.explain{
  margin-top:16px;padding:16px 18px;border-radius:var(--radius-sm);
  background:#fafafa;border-left:4px solid var(--clr-primary);
  font-size:14px;line-height:1.7;display:none;
}
.explain.show{display:block;animation:fadeIn .2s}
.explain .correct{color:var(--clr-success);font-weight:700}
.explain .wrong{color:var(--clr-error);font-weight:700}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* buttons */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;justify-content:center}
.btn-row .spacer{flex:1}
.btn{padding:10px 22px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;min-width:80px;flex:0 1 auto}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:var(--clr-primary);color:#fff}
.btn-primary:hover:not(:disabled){background:#142c4d}
.btn-accent{background:var(--clr-accent);color:#fff}
.btn-accent:hover:not(:disabled){background:#c95f1c}
.btn-ghost{background:var(--clr-primary-light);color:var(--clr-primary)}
.btn-ghost:hover{background:#dce4ef}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-success{background:var(--clr-success);color:#fff}

/* result banner */
.banner{
  margin-top:12px;padding:14px 18px;border-radius:var(--radius-md);
  text-align:center;font-weight:600;display:none;font-size:15px;
}
.banner.show{display:block;animation:fadeIn .25s}
.banner.pass{background:var(--clr-success-light);color:var(--clr-success);border:1px solid var(--clr-success)}
.banner.fail{background:var(--clr-error-light);color:var(--clr-error);border:1px solid var(--clr-error)}
.banner .detail{font-weight:400;font-size:13px;margin-top:4px}

/* review panel */
#reviewView{display:none;padding:16px 0}
#reviewView.active{display:block;animation:slideUp .25s}

.review-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.review-header h2{font-size:18px;color:var(--clr-primary)}
.review-score{text-align:center;padding:20px;background:var(--clr-surface);border-radius:var(--radius-md);border:1px solid var(--clr-border);margin-bottom:18px}
.review-score .pct{font-size:40px;font-weight:700;line-height:1}
.review-score .pct.pass{color:var(--clr-success)}
.review-score .pct.fail{color:var(--clr-error)}
.review-score .label{font-size:14px;color:var(--clr-muted);margin-top:4px}
.review-score .sub{font-size:13px;color:var(--clr-muted);margin-top:6px}
.review-score .stat-row{display:flex;justify-content:center;gap:24px;margin-top:12px;font-size:13px}
.review-score .stat-row span{color:var(--clr-muted)}
.review-score .stat-row strong{color:var(--clr-text)}

.review-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border:1.5px solid var(--clr-border);border-radius:20px;font-size:13px;cursor:pointer;background:var(--clr-surface);color:var(--clr-muted);transition:all .15s}
.filter-btn:active{transform:scale(.96)}
.filter-btn.active{border-color:var(--clr-primary);color:var(--clr-primary);background:var(--clr-primary-light);font-weight:600}

.review-item{
  background:var(--clr-surface);border-radius:var(--radius-md);padding:16px 18px;
  border:1px solid var(--clr-border);margin-bottom:10px;box-shadow:var(--shadow-sm);
}
.review-item .r-header{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.review-item .r-num{font-weight:600;font-size:14px;color:var(--clr-text)}
.review-item .r-status{padding:2px 10px;border-radius:10px;font-size:12px;font-weight:600}
.review-item .r-status.right{background:var(--clr-success-light);color:var(--clr-success)}
.review-item .r-status.wrong{background:var(--clr-error-light);color:var(--clr-error)}
.review-item .r-text{font-size:14px;line-height:1.6;margin-bottom:8px;color:var(--clr-text)}
.review-item .r-answer{font-size:13px;color:var(--clr-muted);margin-bottom:4px}
.review-item .r-answer .highlight{color:var(--clr-success);font-weight:600}
.review-item .r-answer .highlight.wrong{color:var(--clr-error)}
.review-item .r-explain{font-size:13px;color:var(--clr-muted);padding:10px 12px;background:#fafafa;border-radius:var(--radius-sm);margin-top:6px;border-left:3px solid var(--clr-primary);line-height:1.6}
.review-item .r-type{font-size:11px;color:var(--clr-muted);background:var(--clr-primary-light);padding:1px 8px;border-radius:8px}

.scroll-top{
  position:fixed;bottom:24px;right:16px;width:40px;height:40px;border-radius:50%;
  background:var(--clr-primary);color:#fff;border:none;font-size:18px;cursor:pointer;
  box-shadow:0 2px 12px rgba(0,0,0,.15);display:none;transition:all .2s;z-index:100;
  align-items:center;justify-content:center;
}
.scroll-top.show{display:flex}
.scroll-top:active{transform:scale(.9)}

@media(max-width:520px){
  .app{padding:12px 8px 24px}
  .header h1{font-size:19px}
  .home-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .card{padding:16px 12px}
  .card .num{font-size:26px}
  .home-actions{gap:8px}
  .question-area{padding:14px 12px}
  .q-text{font-size:15px}
  .opt{font-size:14px;padding:10px 12px}
  .opt .marker{width:20px;height:20px;font-size:11px}
  .btn{padding:8px 16px;font-size:13px}
  .btn-action{font-size:14px;padding:12px 14px;min-width:0}
  .review-item{padding:12px 14px}
  .review-score .pct{font-size:32px}
}
@media(max-width:380px){
  .home-grid{grid-template-columns:1fr 1fr}
  .home-actions{flex-direction:column}
  .btn-action{min-width:0}
  .nav-bar .nav-btn{font-size:12px;padding:5px 12px}
}
@media(min-width:740px){
  .app{padding:24px 16px 40px}
  .question-area{padding:28px}
  .home-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="app" id="app">

  <div class="header">
    <h1>工程测量 <span class="sub">刷题</span></h1>
    <span class="count" id="totalInfo">共 0 题</span>
  </div>

  <!-- home -->
  <div id="homeView">
    <div class="home-heading"><span class="diamond">◆</span> 选择章节</div>
    <div class="home-grid" id="chapterGrid"></div>
    <div class="home-actions">
      <button class="btn-action btn-random" id="btnRandom">◆ 随机组卷 20 题</button>
      <button class="btn-action btn-all" id="btnAll">◆ 全部题目</button>
    </div>
    <div class="home-footer"><span>点击章节进入练习 · 组卷从各章随机抽取</span></div>
  </div>

  <!-- quiz -->
  <div id="quizView">
    <div class="nav-bar">
      <button class="nav-btn" id="btnBackHome">← 返回</button>
      <button class="nav-btn primary" id="btnToggleMode">章节模式</button>
      <button class="nav-btn outline" id="btnResetProgress">↺ 重置</button>
    </div>

    <div class="stats-bar">
      <span class="tag" id="progressText">0 / 0</span>
      <span class="tag" id="statusText">◆ 答题中</span>
    </div>
    <div class="progress-strip" id="progressStrip">
      <div class="fill" id="progressBar" style="width:0%"></div>
      <div class="dot" id="progressDot" style="left:0%"></div>
    </div>

    <div class="question-area" id="questionArea">
      <div class="q-header">
        <span class="q-type" id="qType">单选题</span>
        <span class="q-number" id="qNumber">第 1 题</span>
      </div>
      <div class="q-label" id="qChapterLabel"></div>
      <div class="q-text" id="qText"></div>
      <div class="options" id="optionsContainer"></div>

      <div class="btn-row">
        <button class="btn btn-accent" id="btnSubmit" disabled>确认答案</button>
        <button class="btn btn-primary" id="btnNext">下一题 →</button>
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn btn-ghost btn-sm" id="btnPrev">← 上一题</button>
        <span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" id="btnShowAnswer">显示答案</button>
      </div>
      <div class="explain" id="explanation"></div>
    </div>

    <div class="banner" id="resultBanner"></div>
  </div>

  <!-- review -->
  <div id="reviewView">
    <div class="review-header">
      <h2>◆ 答题报告</h2>
      <button class="nav-btn primary" id="btnReviewHome">← 返回首页</button>
    </div>

    <div class="review-score" id="reviewScore">
      <div class="pct" id="reviewPct">0%</div>
      <div class="label">正确率</div>
      <div class="sub" id="reviewSub">已完成 0 题</div>
      <div class="stat-row">
        <span>正确 <strong id="reviewCorrect">0</strong></span>
        <span>错误 <strong id="reviewWrong">0</strong></span>
      </div>
    </div>

    <div class="review-filter">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="wrong">仅错题</button>
      <button class="filter-btn" data-filter="right">仅正确</button>
    </div>

    <div id="reviewList"></div>
  </div>

</div>

<button class="scroll-top" id="scrollTop">↑</button>

<script>
// ============================================================
// 题库 - 6 考点
// ============================================================
const CHAPTERS = [{
  id:'ch1',name:'考点一：工程控制网',questions:[{
    id:1,type:'single',question:'工程测量工作应遵循的原则是（　）。',
    options:['A. 必要观测原则','B. 多余观测原则','C. 从整体到局部的原则','D. 并列原则'],
    answer:'C',explanation:'无论是工程测量还是其他测量都要遵循测量工作的两条基本原则：①从整体到局部；②逐步检查。故选C。'
  },{
    id:2,type:'single',question:'下列不属于工程控制网布网原则的是（　）。',
    options:['A. 分级布网，逐级控制','B. 控制网精度高，控制范围小','C. 要有足够的精度和可靠性','D. 要有足够的密度'],
    answer:'B',explanation:'工程控制网的布网原则：分级布网，逐级控制；要有足够的精度和可靠性；要有足够的密度；要有统一的规格。选项B不属于。故选B。'
  },{
    id:3,type:'single',question:'下面关于控制网的叙述错误的是（　）。',
    options:['A. 国家控制网从高级到低级布设','B. 国家控制网分为平面控制网和高程控制网','C. 直接为测图目的建立的控制网，称为图根控制网','D. 国家控制网按精度可分为A、B、C、D、E五级'],
    answer:'D',explanation:'国家控制网按精度可以分为一、二、三、四等；GPS控制网按精度可分为A、B、C、D、E五级。选项D描述错误。故选D。'
  },{
    id:4,type:'single',question:'与国家控制网比较，工程控制网的特点是（　）。',
    options:['A. 边长较长','B. 边长相对精度较高','C. 点位密度大','D. 点位密度小'],
    answer:'C',explanation:'国家控制网边长较长，相对精度较高，点位密度小；工程控制网范围较小，用点率高，点位密度大。故选C。'
  },{
    id:5,type:'single',question:'施工控制网有时分两级布网，次级网的精度（　）首级网的精度。',
    options:['A. 一定低于','B. 一定高于','C. 可能高于','D. 等于'],
    answer:'C',explanation:'施工控制网有时次级网的精度会高于首级网的精度，这是控制网逐级控制的唯一特例。故选C。'
  },{
    id:6,type:'single',question:'施工控制网一般选择投影到主施工高程面作为投影面而不进行高斯投影，主要是为了（　）。',
    options:['A. 方便施工放样，方便控制网观测','B. 方便平差计算','C. 方便观测记录','D. 与城市控制网相区别'],
    answer:'A',explanation:'施工控制网一般选择投影到主施工高程面作为投影面而不进行高斯投影，主要是为了方便施工放样，方便控制网观测。故选A。'
  },{
    id:7,type:'single',question:'下列控制网不是按照网形分的是（　）。',
    options:['A. 三角网','B. 导线网','C. 方格网','D. 附合网'],
    answer:'D',explanation:'工程控制网按网形可分为三角网、导线网、混合网、方格网等。附合网是按照基准划分的。故选D。'

    options:['A. 总平面布置图','B. 建筑物立面图','C. 设计变更文件','D. 放样数据表','E. 施工检测记录'],
    answer:'ACE',explanation:'竣工总图编绘应收集总平面布置图、施工设计图、设计变更文件、施工检测记录、竣工测量资料等。建筑物立面图和放样数据表不属于。故选ACE。'
  },{
    id:26,type:'multi',question:'GPS拟合高程，应符合下列规定：（　）。',
    options:['A. 充分利用当地的重力大地水准面模型或资料','B. 对于大面积测区，尽量采用简单的平面拟合模型','C. 对于地形起伏较大的测区，宜采用曲面拟合模型','D. 对拟合高程模型应进行优化','E. GPS点的高程计算，不宜超出拟合高程模型所覆盖的范围'],
    answer:'ACDE',explanation:'对于地形平坦的小测区可采用平面拟合模型，对于地形起伏较大的大面积测区宜采用曲面拟合模型。选项B描述错误。故选ACDE。'
  }]
}];

// ============================================================
// App Logic
// ============================================================
let allQuestions = [];
let flatQuestions = [];
CHAPTERS.forEach(ch => {
  ch.questions.forEach(q => {
    flatQuestions.push({ ...q, chapterId: ch.id, chapterName: ch.name });
  });
});

let currentMode = 'chapter';
let currentChapterId = null;
let currentQuestions = [];
let currentIndex = 0;
let answered = false;
let selectedOptions = [];
let isMulti = false;
let score = 0;
let totalAnswered = 0;
let quizHistory = {};
let reviewFilter = 'all';

const $ = id => document.getElementById(id);
const dom = {
  homeView: $('homeView'), quizView: $('quizView'), reviewView: $('reviewView'),
  chapterGrid: $('chapterGrid'), btnRandom: $('btnRandom'), btnAll: $('btnAll'),
  btnBackHome: $('btnBackHome'), btnToggleMode: $('btnToggleMode'), btnResetProgress: $('btnResetProgress'),
  btnPrev: $('btnPrev'), btnNext: $('btnNext'), btnSubmit: $('btnSubmit'), btnShowAnswer: $('btnShowAnswer'),
  progressText: $('progressText'), statusText: $('statusText'), progressBar: $('progressBar'), progressDot: $('progressDot'),
  qNumber: $('qNumber'), qType: $('qType'), qText: $('qText'), qChapterLabel: $('qChapterLabel'),
  optionsContainer: $('optionsContainer'), explanation: $('explanation'), resultBanner: $('resultBanner'),
  totalInfo: $('totalInfo'), scrollTop: $('scrollTop'),
  reviewScore: $('reviewScore'), reviewPct: $('reviewPct'), reviewSub: $('reviewSub'),
  reviewCorrect: $('reviewCorrect'), reviewWrong: $('reviewWrong'), reviewList: $('reviewList'),
  btnReviewHome: $('btnReviewHome'),
};

function init() {
  dom.totalInfo.textContent = '共 ' + flatQuestions.length + ' 题';
  renderHome();
  bindEvents();
  window.addEventListener('scroll', handleScroll);
}

function handleScroll() {
  dom.scrollTop.classList.toggle('show', window.scrollY > 300);
}
dom.scrollTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

function renderHome() {
  let html = '';
  CHAPTERS.forEach(ch => {
    const count = ch.questions.length;
    html += '<div class="card" data-chapter="' + ch.id + '">'
      + '<div class="num">' + count + '</div>'
      + '<div class="name">' + ch.name.replace('考点','') + '</div>'
      + '<div class="badge">' + ch.id.replace('ch','') + '</div>'
      + '<div class="bar" style="width:0%"></div></div>';
  });
  dom.chapterGrid.innerHTML = html;
  document.querySelectorAll('.card[data-chapter]').forEach(el => {
    el.addEventListener('click', () => startChapter(el.dataset.chapter));
  });
}

function bindEvents() {
  dom.btnRandom.addEventListener('click', startRandom);
  dom.btnAll.addEventListener('click', startAll);
  dom.btnBackHome.addEventListener('click', goHome);
  dom.btnToggleMode.addEventListener('click', toggleMode);
  dom.btnResetProgress.addEventListener('click', resetProgress);
  dom.btnPrev.addEventListener('click', prevQuestion);
  dom.btnNext.addEventListener('click', nextQuestion);
  dom.btnSubmit.addEventListener('click', submitAnswer);
  dom.btnShowAnswer.addEventListener('click', showAnswer);
  dom.btnReviewHome.addEventListener('click', goHome);
}

function goHome() {
  dom.homeView.style.display = '';
  dom.quizView.classList.remove('active');
  dom.reviewView.classList.remove('active');
  dom.btnToggleMode.textContent = '章节模式';
  dom.btnToggleMode.classList.add('active');
  currentMode = 'chapter';
  window.scrollTo({ top: 0 });
}

function startChapter(chId) {
  currentChapterId = chId;
  const ch = CHAPTERS.find(c => c.id === chId);
  if (!ch) return;
  currentQuestions = ch.questions.map(q => ({ ...q, chapterId: ch.id, chapterName: ch.name }));
  currentMode = 'chapter';
  dom.btnToggleMode.textContent = '章节模式';
  dom.btnToggleMode.classList.add('active');
  enterQuiz();
}

function shuffleOptions(q) {
  // 打乱选项顺序，同时更新 answer 以匹配新的字母标签
  const labels = 'ABCDEFGH';
  const optionTexts = q.options.map(opt => opt.replace(/^[A-Z]\.\s*/, ''));
  const correctLabels = q.answer.split('').filter(s => s.trim());
  const correctTexts = correctLabels.map(label => optionTexts[labels.indexOf(label)]);

  const indices = optionTexts.map((_, i) => i);
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }

  const newOptions = indices.map((oldIdx, newIdx) => labels[newIdx] + '. ' + optionTexts[oldIdx]);
  const newAnswer = correctTexts
    .map(text => labels[indices.findIndex(oldIdx => optionTexts[oldIdx] === text)])
    .sort()
    .join('');

  return { ...q, options: newOptions, answer: newAnswer };
}

function startRandom() {
  const shuffled = [...flatQuestions].sort(() => Math.random() - 0.5);
  currentQuestions = shuffled.slice(0, 20).map(q => shuffleOptions(q));
  console.log('组卷首题选项:', currentQuestions[0].options, '答案:', currentQuestions[0].answer);
  currentMode = 'random';
  dom.btnToggleMode.textContent = '随机组卷';
  dom.btnToggleMode.classList.remove('active');
  enterQuiz();
}

function startAll() {
  currentQuestions = flatQuestions.map(q => ({ ...q }));
  currentMode = 'chapter';
  dom.btnToggleMode.textContent = '全部题目';
  dom.btnToggleMode.classList.remove('active');
  enterQuiz();
}

function toggleMode() {
  if (currentMode === 'chapter') startRandom();
  else if (currentChapterId) startChapter(currentChapterId);
  else goHome();
}

function enterQuiz() {
  dom.homeView.style.display = 'none';
  dom.reviewView.classList.remove('active');
  dom.quizView.classList.add('active');
  currentIndex = 0; answered = false; selectedOptions = [];
  quizHistory = {}; score = 0; totalAnswered = 0;
  dom.resultBanner.classList.remove('show','pass','fail');
  dom.resultBanner.textContent = '';
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0 });
}

function renderQuestion() {
  if (currentQuestions.length === 0) return;
  const q = currentQuestions[currentIndex];
  isMulti = q.type === 'multi';
  dom.qNumber.textContent = '第 ' + (currentIndex + 1) + ' 题';
  dom.qType.textContent = isMulti ? '多选题' : '单选题';
  dom.qType.className = 'q-type ' + (isMulti ? 'multi' : 'single');
  dom.qChapterLabel.textContent = q.chapterName || '';
  dom.qText.textContent = q.question;

  let html = '';
  const labels = 'ABCDEFGH';
  q.options.forEach((opt, idx) => {
    const label = labels[idx] || '?';
    const cls = selectedOptions.includes(idx) ? 'selected' : '';
    const text = opt.replace(/^[A-Z]\.\s*/, '');
    html += '<div class="opt ' + cls + '" data-idx="' + idx + '" data-label="' + label + '">'
      + '<span class="marker">' + label + '</span>'
      + '<span class="text">' + text + '</span></div>';
  });
  dom.optionsContainer.innerHTML = html;

  document.querySelectorAll('.opt').forEach(el => {
    el.addEventListener('click', function() {
      if (answered) return;
      const idx = parseInt(this.dataset.idx);
      if (isMulti) {
        const i = selectedOptions.indexOf(idx);
        if (i >= 0) { selectedOptions.splice(i,1); this.classList.remove('selected'); }
        else { selectedOptions.push(idx); this.classList.add('selected'); }
        dom.btnSubmit.disabled = selectedOptions.length === 0;
      } else {
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
        selectedOptions = [idx];
        this.classList.add('selected');
        dom.btnSubmit.disabled = false;
      }
    });
  });

  answered = false;
  dom.btnSubmit.disabled = true;
  dom.btnNext.disabled = false;
  dom.btnNext.textContent = currentIndex < currentQuestions.length - 1 ? '下一题 →' : '完成 ✓';
  dom.explanation.classList.remove('show');
  dom.explanation.innerHTML = '';
  dom.resultBanner.classList.remove('show','pass','fail');
  dom.resultBanner.textContent = '';

  const key = getQuestionKey(q);
  if (quizHistory[key] !== undefined) {
    answered = true;
    dom.btnSubmit.disabled = true;
    submitAnswerSilent(q, quizHistory[key]);
    if (currentMode !== 'random') {
      showExplanation(q, quizHistory[key]);
    }
  }
  updateProgress();
}

function getQuestionKey(q) { return q.chapterId + '_' + q.id; }

function updateProgress() {
  const total = currentQuestions.length;
  const done = Object.keys(quizHistory).length;
  dom.progressText.textContent = done + ' / ' + total;
  const pct = total > 0 ? (done / total * 100) : 0;
  dom.progressBar.style.width = Math.min(pct, 100) + '%';
  dom.progressDot.style.left = Math.min(pct, 100) + '%';
  dom.progressDot.classList.toggle('active', done > 0);
  const allDone = done === total;
  dom.statusText.textContent = allDone ? '已完成 ✓' : '进度 ' + Math.round(pct) + '%';
  if (allDone && total > 0) {
    const correct = Object.values(quizHistory).filter(v => v === true).length;
    dom.statusText.textContent = '完成！正确 ' + correct + '/' + total;
    dom.statusText.classList.add('done');
  } else {
    dom.statusText.classList.remove('done');
  }
}

// Store user answers for review
let userAnswersMap = {};

function submitAnswer() {
  if (answered || selectedOptions.length === 0) return;
  const q = currentQuestions[currentIndex];
  const key = getQuestionKey(q);
  userAnswersMap[key] = [...selectedOptions];
  const labels = 'ABCDEFGH';
  let isCorrect = false;
  if (isMulti) {
    const correctArr = q.answer.split('').filter(s => s.trim());
    const selectedArr = selectedOptions.map(idx => labels[idx] || '').filter(s => s);
    isCorrect = [...correctArr].sort().join('') === [...selectedArr].sort().join('') && correctArr.length === selectedArr.length;
  } else {
    isCorrect = (labels[selectedOptions[0]] || '') === q.answer;
  }
  quizHistory[key] = isCorrect;
  if (isCorrect) score++;
  totalAnswered++;
  submitAnswerSilent(q, isCorrect);
  answered = true;
  dom.btnSubmit.disabled = true;
  updateProgress();

  // 章节模式即时显示解析，组卷模式不显示
  if (currentMode !== 'random') {
    showExplanation(q, isCorrect);
  }

  if (Object.keys(quizHistory).length === currentQuestions.length) {
    const correct = Object.values(quizHistory).filter(v => v === true).length;
    const total = currentQuestions.length;
    dom.resultBanner.classList.add('show');
    dom.resultBanner.textContent = '完成！正确 ' + correct + '/' + total + ' (' + Math.round(correct/total*100) + '%)';
    dom.resultBanner.classList.add(correct/total >= 0.6 ? 'pass' : 'fail');
    dom.resultBanner.innerHTML += '<div class="detail">点击 "完成 ✓" 查看详细报告</div>';
  }
}

function submitAnswerSilent(q, isCorrect) {
  const correctAnswer = q.answer;
  const labels = 'ABCDEFGH';
  document.querySelectorAll('.opt').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const label = labels[idx] || '';
    el.classList.add('disabled');
    if (q.type === 'multi') {
      const correctArr = correctAnswer.split('').filter(s => s.trim());
      if (correctArr.includes(label)) el.classList.add('correct');
      else if (selectedOptions.includes(idx) && !correctArr.includes(label)) el.classList.add('wrong');
    } else {
      if (label === correctAnswer) el.classList.add('correct');
      else if (selectedOptions.includes(idx) && label !== correctAnswer) el.classList.add('wrong');
    }
    if (selectedOptions.includes(idx) && !el.classList.contains('correct') && !el.classList.contains('wrong')) {
      el.classList.add('wrong');
    }
  });
  dom.btnSubmit.disabled = true;
}

function showExplanation(q, isCorrect) {
  const correctAnswer = q.answer;
  const correctStr = q.type === 'multi' ? correctAnswer.split('').join('、') : correctAnswer;
  const icon = isCorrect ? '✓' : '✗';
  const sc = isCorrect ? 'correct' : 'wrong';
  dom.explanation.innerHTML = '<div><strong>' + icon + ' 答案：</strong><span class="' + sc + '">' + (isCorrect ? '正确' : '错误') + '</span>　<strong>正确答案：</strong>' + correctStr + '</div>'
    + (q.explanation ? '<div style="margin-top:8px;"><strong>解析：</strong>' + q.explanation + '</div>' : '');
  dom.explanation.classList.add('show');
}

function showAnswer() {
  if (answered) return;
  const q = currentQuestions[currentIndex];
  const labels = 'ABCDEFGH';
  document.querySelectorAll('.opt').forEach(el => {
    const label = labels[parseInt(el.dataset.idx)] || '';
    if (q.type === 'multi') {
      if (q.answer.split('').filter(s => s.trim()).includes(label)) el.classList.add('correct');
    } else {
      if (label === q.answer) el.classList.add('correct');
    }
    el.classList.add('disabled');
  });
  dom.explanation.innerHTML = '<div><strong>正确答案：</strong>' + (q.type === 'multi' ? q.answer.split('').join('、') : q.answer) + '</div>'
    + (q.explanation ? '<div style="margin-top:8px;"><strong>解析：</strong>' + q.explanation + '</div>' : '');
  dom.explanation.classList.add('show');
  dom.btnSubmit.disabled = true;
  answered = true;
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++; selectedOptions = []; dom.btnSubmit.disabled = true;
    renderQuestion();
    window.scrollTo({ top: 0 });
  } else {
    showReview();
  }
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--; selectedOptions = []; dom.btnSubmit.disabled = true;
    renderQuestion();
    window.scrollTo({ top: 0 });
  }
}

function resetProgress() {
  if (currentQuestions.length === 0) return;
  if (!confirm('确定要重置当前进度吗？')) return;
  quizHistory = {}; score = 0; totalAnswered = 0;
  currentIndex = 0; selectedOptions = []; answered = false;
  dom.btnSubmit.disabled = true;
  dom.resultBanner.classList.remove('show','pass','fail');
  dom.resultBanner.textContent = '';
  renderQuestion();
  updateProgress();
  window.scrollTo({ top: 0 });
}

// ============================================================
// Review Panel
// ============================================================
function showReview() {
  dom.quizView.classList.remove('active');
  dom.reviewView.classList.add('active');
  const total = currentQuestions.length;
  const correct = Object.values(quizHistory).filter(v => v === true).length;
  const wrong = total - correct;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;

  dom.reviewPct.textContent = pct + '%';
  dom.reviewPct.className = 'pct ' + (pct >= 60 ? 'pass' : 'fail');
  dom.reviewSub.textContent = '已完成 ' + total + ' 题';
  dom.reviewCorrect.textContent = correct;
  dom.reviewWrong.textContent = wrong;

  reviewFilter = 'all';
  renderReviewItems();
  setupReviewFilters();
  window.scrollTo({ top: 0 });
}

function renderReviewItems() {
  const labels = 'ABCDEFGH';
  let html = '';
  currentQuestions.forEach((q, idx) => {
    const key = getQuestionKey(q);
    const result = quizHistory[key];
    if (result === undefined) return;
    if (reviewFilter === 'wrong' && result) return;
    if (reviewFilter === 'right' && !result) return;

    const isCorrect = result;
    const correctStr = q.type === 'multi' ? q.answer.split('').join('、') : q.answer;

    let userAnswerStr = '';
    const userAns = userAnswersMap[key];
    if (userAns) {
      userAnswerStr = userAns.map(i => labels[i] || '').join('、');
    } else {
      userAnswerStr = '(未记录)';
    }

    const statusClass = isCorrect ? 'right' : 'wrong';
    const statusText = isCorrect ? '✓ 正确' : '✗ 错误';

    // 构建选项展示
    let optHtml = '<div class="r-options" style="margin:6px 0 10px;padding:8px 10px;background:#f8f8f8;border-radius:8px;font-size:13px;line-height:1.7">';
    const correctArr = q.answer.split('').filter(s => s.trim());
    q.options.forEach((opt, oi) => {
      const label = labels[oi];
      const text = opt.replace(/^[A-Z]+\.\s*/, '');
      const isCorrectOpt = correctArr.includes(label);
      const isUserSel = userAns && userAns.includes(oi);
      let style = '', prefix = '';
      if (isCorrectOpt) { style = 'color:var(--clr-success);font-weight:600'; prefix = '✓ '; }
      else if (!isCorrect && isUserSel) { style = 'color:var(--clr-error);font-weight:600'; prefix = '✗ '; }
      optHtml += '<div style="' + style + '">' + prefix + label + '. ' + text + '</div>';
    });
    optHtml += '</div>';

    html += '<div class="review-item">'
      + '<div class="r-header">'
      + '<span class="r-num">第 ' + (idx + 1) + ' 题 <span class="r-type">' + (q.type === 'multi' ? '多选题' : '单选题') + '</span></span>'
      + '<span class="r-status ' + statusClass + '">' + statusText + '</span>'
      + '</div>'
      + '<div class="r-text">' + q.question + '</div>'
      + optHtml
      + '<div class="r-answer">你的答案：<span class="highlight' + (isCorrect ? '' : ' wrong') + '">' + userAnswerStr + '</span></div>'
      + '<div class="r-answer">正确答案：<span class="highlight">' + correctStr + '</span></div>'
      + (q.explanation ? '<div class="r-explain">' + q.explanation + '</div>' : '')
      + '</div>';
  });
  if (!html) {
    html = '<div style="text-align:center;padding:40px 20px;color:var(--clr-muted);font-size:14px;">没有符合条件的题目</div>';
  }
  dom.reviewList.innerHTML = html;
}

function setupReviewFilters() {
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      filterBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      reviewFilter = this.dataset.filter;
      renderReviewItems();
    });
  });
}

init();
</script>
